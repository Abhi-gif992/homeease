<!DOCTYPE html>
<html>
<head>
<title>HomeEase - Book Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; margin:0; background:#f4f6f9;}
header {background:#007bff; color:white; padding:15px; text-align:center;}
.container {padding:20px;}
.card {background:white; padding:15px; margin:10px 0; border-radius:10px;}
button {background:#007bff; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;}
input, select {width:100%; padding:10px; margin:5px 0;}
.form-box {background:white; padding:15px; border-radius:10px; margin-top:20px;}
.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}
</style>
</head>

<body>

<header>
<h1>HomeEase</h1>
<p>Book Home Services Easily</p>
</header>

<div class="container">

<h2>Our Services</h2>

<div class="card">
<h3>Salon at Home</h3>
<p>Starting ₹499</p>
<button onclick="selectService('Salon at Home')">Book</button>
</div>

<div class="card">
<h3>Cleaning Service</h3>
<p>Starting ₹299</p>
<button onclick="selectService('Cleaning Service')">Book</button>
</div>

<div class="card">
<h3>Electrician / Plumber</h3>
<p>Starting ₹199</p>
<button onclick="selectService('Electrician / Plumber')">Book</button>
</div>

<div class="form-box">
<h2>Booking Form</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Mobile Number">
<input type="text" id="address" placeholder="Address">

<select id="service">
<option>Select Service</option>
<option>Salon at Home</option>
<option>Cleaning Service</option>
<option>Electrician / Plumber</option>
</select>

<input type="datetime-local" id="date">

<button onclick="submitBooking()">Submit Booking</button>

</div>

</div>

<!-- WhatsApp Button -->
<a href="https://wa.me/917528990269?text=Hello%20mujhe%20service%20chahiye" target="_blank">
  WhatsApp Now
</a>
</a>

<script>
function selectService(service){
document.getElementById("service").value = service;
window.scrollTo(0, document.body.scrollHeight);
}

function submitBooking(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let service = document.getElementById("service").value;
let date = document.getElementById("date").value;

if(name=="" || phone=="" || address=="" || service=="Select Service"){
alert("Please fill all details");
return;
}

let msg = `New Booking:
Name: ${name}
Phone: ${phone}
Service: ${service}
Address: ${address}
Date: ${date}`;

let url = "https://wa.me/91XXXXXXXXXX?text=" + encodeURIComponent(msg);
window.open(url, '_blank');
}
</script>

</body>
</html>
